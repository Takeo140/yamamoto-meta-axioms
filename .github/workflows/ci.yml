name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-lean:
    name: Lean 4 Formal Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Lean 4
        uses: leanprover/lean4-action@v1

      - name: Build and verify Lean proofs
        run: lake build

  verify-python:
    name: Python Logic Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install numpy

      - name: Run logic verification
        run: python verify_42.py
